<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Home</title>
    <link rel="stylesheet" href="/style/output.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">Add your Home</h1>
            <p class="text-gray-500 text-center mb-8 text-sm">
                Share your space with travelers from around the world.
            </p>
 
            <form action="/host/add-home" method="POST">  
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" >House Name</label>
                    <input
                    type="text"
                    name="houseName"
                    placeholder="e.g. Cozy Beachfront Villa"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent transition"
                    required
                />
                </div>                  
                <button 
                    type="submit" 
                    class="w-full bg-rose-500 text-white font-bold py-3 rounded-lg hover:bg-rose-600 active:scale-95 transition-all shadow-md">
                    Add Home
                </button>

                <div class="text-center">
                    <a href="/" class="text-sm text-gray-500 hover:underline">Cancel and go back</a>
                </div>
            </form>
            
          
    </div>
   
                
</body>
</html>
